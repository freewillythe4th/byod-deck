<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presenter Notes - Bring Your Own Deals</title>
<style>
  :root {
    --ink: #14100D; --panel: #1C1712; --panel-2: #251E18; --border: #352B22;
    --cream: #F2EDE3; --muted: #A89A8B; --accent: #5C8DFF; --accent-deep: #2563EB;
    --warm: #E0916F; --gold: #E7C77A;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --serif: 'Instrument Serif', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--ink); color: var(--cream); font-family: var(--sans); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
  .layout { display: grid; grid-template-columns: 42% 58%; grid-template-rows: auto 1fr auto; height: 100vh; }

  header { grid-column: 1 / -1; padding: 11px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  header .id { display: flex; align-items: baseline; gap: 10px; }
  header .id b { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
  header .id span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; }
  .right { display: flex; align-items: center; gap: 14px; }
  select { background: var(--ink); color: var(--cream); border: 1px solid var(--border); padding: 6px 10px; border-radius: 7px; font-size: 12px; font-family: var(--sans); max-width: 230px; }
  .controls { display: flex; gap: 6px; }
  .controls button, .timeline button { background: var(--panel-2); border: 1px solid var(--border); color: var(--cream); padding: 6px 11px; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: var(--sans); transition: background 140ms ease; }
  .controls button:hover, .timeline button:hover { background: var(--border); }
  .timeline { display: flex; align-items: center; gap: 10px; font-variant-numeric: tabular-nums; }
  .timeline .target { color: var(--muted); font-size: 11px; }
  .timeline .clock { font-size: 17px; font-weight: 700; min-width: 64px; text-align: right; color: var(--gold); }
  .timeline .clock.over { color: var(--warm); }
  .timeline button { background: var(--accent-deep); border-color: var(--accent-deep); color: #fff; font-weight: 600; }

  .preview { background: #000; border-right: 1px solid var(--border); position: relative; overflow: hidden; }
  .preview iframe { width: 100%; height: 100%; border: 0; display: block; }
  .preview .pv-tag { position: absolute; top: 10px; left: 12px; z-index: 5; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); background: rgba(20,16,13,0.7); padding: 4px 9px; border-radius: 999px; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }

  .notes { overflow-y: auto; padding: 26px 30px 40px; background: var(--panel); }
  .notes .tag { display: inline-block; padding: 4px 11px; background: var(--accent-deep); color: #fff; font-size: 10px; font-weight: 700; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.1em; }
  .notes .tag.peak { background: var(--gold); color: var(--ink); }
  .notes .tag.reserve { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .notes h2 { font-family: var(--serif); font-weight: 400; font-size: 33px; line-height: 1.04; letter-spacing: -0.01em; margin: 13px 0 4px; }
  .notes .num { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
  .notes .land { margin: 18px 0 6px; padding: 14px 16px 14px 18px; border-left: 3px solid var(--gold); background: rgba(231,199,122,0.07); border-radius: 0 10px 10px 0; }
  .notes .land .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); display: block; margin-bottom: 5px; }
  .notes .land p { font-family: var(--serif); font-size: 21px; line-height: 1.22; color: var(--cream); }
  .notes ul { list-style: none; margin: 18px 0 0; }
  .notes ul li { position: relative; padding: 0 0 11px 20px; font-size: 15.5px; line-height: 1.42; color: #E8E0D4; }
  .notes ul li::before { content: ''; position: absolute; left: 2px; top: 9px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .notes .cue { margin-top: 14px; padding: 12px 15px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; font-size: 13.5px; line-height: 1.45; color: var(--muted); }
  .notes .cue b { color: var(--warm); font-weight: 600; }
  .notes .ask { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
  .notes .ask h3 { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 9px; }
  .notes .ask button { display: block; width: 100%; text-align: left; background: var(--ink); border: 1px solid var(--border); color: var(--cream); padding: 9px 13px; border-radius: 8px; margin-bottom: 7px; cursor: pointer; font-size: 13px; font-family: var(--sans); transition: border-color 140ms ease, background 140ms ease; }
  .notes .ask button:hover { border-color: var(--accent); background: var(--panel-2); }

  footer { grid-column: 1 / -1; padding: 9px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); }
  footer b { color: var(--cream); font-weight: 600; }
  .seg { display: flex; gap: 3px; align-items: center; }
  .seg i { width: 9px; height: 9px; border-radius: 50%; background: var(--border); display: inline-block; }
  .seg i.done { background: var(--accent-deep); } .seg i.cur { background: var(--gold); transform: scale(1.25); }
  @media (max-width: 900px){ .layout { grid-template-columns: 1fr; grid-template-rows: auto 200px 1fr auto; } .preview { border-right: 0; border-bottom: 1px solid var(--border); } }
</style>
</head>
<body>
<div class="layout">
  <header>
    <div class="id"><b>Bring Your Own Deals</b><span>beehiiv &middot; Senior PMM</span></div>
    <div class="right">
      <select id="slideSelect" aria-label="Jump to slide"></select>
      <div class="controls"><button onclick="prev()" aria-label="Previous">&larr;</button><button onclick="next()" aria-label="Next">&rarr;</button></div>
      <div class="timeline"><span class="target" id="target">Target 0:00</span><span class="clock" id="clock">0:00</span><button id="timerBtn" onclick="toggleTimer()">Start</button><button onclick="resetTimer()">Reset</button></div>
    </div>
  </header>

  <div class="preview"><iframe id="preview" src="deck.html"></iframe></div>

  <aside class="notes" id="notesCol">
    <span class="num" id="num"></span>
    <span class="tag" id="tag"></span>
    <h2 id="title"></h2>
    <div class="land" id="landWrap"><span class="lbl">Land this line</span><p id="land"></p></div>
    <ul id="body"></ul>
    <div class="cue" id="cue"></div>
    <div class="ask" id="ask"></div>
  </aside>

  <footer>
    <span>Slide <b id="slideNum">1</b> of <b id="slideTotal">31</b> &nbsp;&middot;&nbsp; <span id="phase"></span></span>
    <div class="seg" id="seg"></div>
    <span>Budget <b id="slideBudget">0:00</b> &nbsp;&middot;&nbsp; Cumulative target <b id="cumTarget">0:00</b></span>
  </footer>
</div>

<script>
  // Per-slide budgets in seconds (live core presented; appendix held at 0).
  const BUDGETS = [20,35,75,50,50,60,50,50,60,45,90,60,40,75,45,50,90,75,75,75,150,75,60,50,45,15, 0,0,0,0,0];

  const PEAK = new Set([1,5,13,20]); // STAR / peak moments
  const NOTES = [
    { tag:'Open', title:'Cover', phase:'Open',
      land:'I picked your highest-value creator surface, Direct Sponsorships, and the one change that gets the creators you most want onto it.',
      body:['Say the title and the one-line setup. Do not read the slide.','Hold a beat, then go straight into the eBay cold open.'],
      cue:'Calm and unhurried. This sets the operator tone for the whole hour.' },
    { tag:'Open', title:'Cold open, eBay', phase:'Open',
      land:'I have solved this exact problem before. I ran the advertiser side of eBay’s ad network.',
      body:['15 seconds. Plant the operator credibility before any analysis.','What capped our yield was not inventory, it was advertiser confidence.','beehiiv has the same gap on Direct Sponsorships. The full eBay proof returns at the end as the payoff.'],
      cue:'<b>For Darren and Tyler.</b> This is doing, not theorising. Land it cold, no hedging.' },
    { tag:'Frame', title:'The research', phase:'Frame',
      land:'The one number they care about is the one only the sender can stand behind. That is the whole pitch.',
      body:['I started with creators, not a dashboard: two interviews (Isaac 120k, Alex 70k), ~10k hiiv messages.','Two things came up unprompted: it only runs the deals you book, and the tracking gets stripped.','Isaac: “every deal I’ve done, I sourced myself, not through Passionfroot.”'],
      cue:'<b>Darren wants verbatim creator quotes.</b> Use their names, say the quotes out loud.' },
    { tag:'Frame', title:'Community gaps', phase:'Frame',
      land:'I did not guess the gap. I found it in your own community.',
      body:['The storefront has no inbound demand, creators say so themselves.','Open rate is distrusted, which is the opening for a verified kit.','Pricing has no anchor, a setup blocker and a rate-card lever.'],
      cue:'Shows research rigor and that I am inside the hiiv community. Keep the quotes anonymized, never name a creator.' },
    { tag:'Frame', title:'The stakes', phase:'Frame',
      land:'Direct is four figures a deal. The network is built for something else.',
      body:['$35-40 CPM on a direct placement vs $6-8 on the Ad Network.','You built the full product to win direct: storefront, booking, proposals, payment.','So the gap worth fixing is adoption, not the product.'],
      cue:'If pushed on "just Isaac": a 33k-sub operator on r/beehiiv (~$300k a year) says owned-ad CPMs beat the network "by an order of magnitude." Figures flagged to validate against beehiiv’s data.' },
    { tag:'Frame', title:'The wall', phase:'Frame',
      land:'You built the operating system, then walled it to the deals you book.',
      body:['The product is good, so adoption stalls for one reason: it only runs the deals you booked.','The gate: locked to Max and Enterprise. The floor: the $15k network minimum leaves the mid operator unserved.','A conservative count of operators running a few four-figure deals is creator revenue in the millions you don’t touch. Size it week one.'],
      cue:'STAR line. Say it slowly and let it sit before you move on.' },
    { tag:'Frame', title:'Built vs proposed', phase:'Frame',
      land:'Left is live today. Right is the proposal, three additions on measurement you already run.',
      body:['Ships today: storefront, calendar, proposals, the $10 fee, verified clicks, a creator-facing report, and manual partner add.','BYOD adds three: ingest a deal that closed OFF beehiiv, a verified media kit before the buy, a sponsor account (the sponsor-facing certified report).','Pre-empt Jake: yes, you can already add a partner and send a proposal, if it runs on beehiiv. The gap is the off-platform deal and proof the sponsor can hold.'],
      cue:'<b>For Jake and Shreya.</b> Both know this stack cold, so nobody should have to guess what is real vs proposed. The media kit extends the website builder Shreya led.' },
    { tag:'Who', title:'The persona', phase:'Frame',
      land:'This is the creator who gains the most and runs on it the least.',
      body:['The established operator: 15k-100k+, a growth marketer by trade who already sells direct, running ops across Notion and a hand-built media kit (a marketplace like Passionfroot if they use one).','The prize: the most deals, the biggest brands, the relationships. Isaac and Alex are this profile.','Everything in the plan aims at this one persona, not the whole base.'] },
    { tag:'Pitch', title:'Why the alternatives lose', phase:'Pitch',
      land:'Only the sender can certify a specific ad’s clicks. Everything else works from outside the send.',
      body:['Every tool owns one slice: finding (marketplaces), organising (Notion), or presenting (a PDF).','Passionfroot is strongest, it even reads your API. I concede discovery, that is its moat.','The line that holds is narrower: it sits outside the send. That holds across the whole field.'],
      cue:'Do not overclaim. Passionfroot has a verified kit and stats. The edge is structural, not a hidden number.',
      ask:[[27,'A1 · the full competitive table']] },
    { tag:'Pitch', title:'The objection', phase:'Pitch',
      land:'Isaac: “I probably wouldn’t run beehiiv alongside Passionfroot. It’s one or the other.”',
      body:['A half-product loses this creator. A nicer storefront is not a reason to switch.','So the bar is the whole business: every deal, certified from inside the send, on their terms.','Land Isaac’s confirmation: “if I could run 100% of my ad calendar through one platform, I’d do it for sure.”'],
      cue:'Stage direction, not a line: raise this objection yourself before they can. The confidence is the move.' },
    { tag:'Pitch', title:'Without and with', phase:'Pitch',
      land:'Same creator, same deal. One version they dread, one they’d switch for.',
      body:['Without: the deal lives in Notion and the inbox, scheduled in beehiiv separately, and every pitch they vouch for their own numbers, a live but self-reported dashboard. Nothing is certified by the platform that sent it.','With: one link first, a verified media kit certified by beehiiv before the buy, then the deal runs in the send, then the sponsor gets a certified report, keep the rate, $10 flat.','The last line is the flywheel: the brand they brought is now an account on beehiiv.'],
      cue:'The emotional turn. Slow down and give it room. Walk the dread side, then the clean side.' },
    { tag:'Pitch', title:'Positioning and message', phase:'Pitch',
      land:'Run your whole sponsorship business on beehiiv. Even the deals you bring yourself.',
      body:['Internal read: we claim the operating system for a creator’s sponsorship business, not a booking storefront.','The creator-facing hero, in beehiiv’s live voice, and it is built (the live landing page).','One edge none can match: certified proof of delivery from inside the send.'] },
    { tag:'Pitch', title:'Three benefits', phase:'Pitch',
      land:'Keep more, prove more, juggle less.',
      body:['Keep more: a flat $10, no cut chasing your brand on every renewal.','Prove more: proof the sponsor can hold, certified by the platform that sends your newsletter, not your screenshot.','Juggle less: one calendar for every deal. beehiiv already reports those clicks to the creator, the new part is putting the proof in the sponsor’s hands.'] },
    { tag:'Pitch', title:'One change and the moat', phase:'Pitch',
      land:'Run and certify every deal. That’s the part no rival can copy.',
      body:['The one change: run and certify every deal, not just the ones you booked. Concede discovery, don’t fight it.','Why it’s cheap: calendar, placement, reporting and measurement all exist. Add three: the off-platform ingest, the media kit, the sponsor account.','I checked your API. Passionfroot already pulls audience stats through it, so the number isn’t the edge.'],
      cue:'<b>Most important slide for accuracy with Jake and Shreya.</b> Concede the report exists and is creator-facing, and manual partner add exists. The net-new is the deal that closed OFF beehiiv and the sponsor-facing certified proof.' },
    { tag:'Pitch', title:'The flywheel', phase:'Pitch',
      land:'You grow the demand side off the supply side you already own.',
      body:['Creator runs their deal, the sponsor makes an account to see the report, the brand is now on beehiiv.','You didn’t recruit it, the creator brought it. And these are big brands.','Once in, the brand does more direct deals here, then buys through the Ad Network.'],
      cue:'<b>For Tony.</b> Every self-sourced deal drops a warmed advertiser into your system for free. <b>If Jake is engaged:</b> this is the supply that the personalised brand outreach at scale greenfield he named in his Jan newsletter would run on. BYOD is step one toward it. Say it live, do not script it.' },
    { tag:'Pitch', title:'The economics', phase:'Pitch',
      land:'On a $1,500 deal, that’s $10 against the cut.',
      body:['Passionfroot’s 15% sticks to the brand on every renewal, so creators fight to escape it.','Isaac moved a sponsor to direct billing just to escape the cut: “it’s like 15%, it’s crazy.”','beehiiv: the relationship stays theirs, at a flat $10.'],
      cue:'Honesty: 15% is on Passionfroot-sourced deals. On self-sourced it’s $10 vs ~5% brand-side. Never imply 15% on self-sourced.' },
    { tag:'Plan', title:'The 90-day plan', phase:'Plan',
      land:'The campaign runs the full 90 days, not the back half.',
      body:['An adoption program, not a release. Two tracks in parallel from day zero.','Track 1, no engineering: recruit eligible creators onto the live surface, start the slow-burn SEO and content now.','Track 2, on Product’s clock: ingest, media kit, sponsor account. Layers in around day 45, cheapest-confidence-first.','Most adoption plans burn the first six weeks waiting for the feature. This one doesn’t.'] },
    { tag:'Plan', title:'The cohort and the bets', phase:'Plan',
      land:'The cohort is the engine, not a launch panel.',
      body:['Recruit 15-25 operators who already sell direct. Three jobs: design partners, public proof, references.','Pick on fit, not follower count. Bet on the portfolio, not one name.','Bets: safe (cohort + triggers + SEO, day 0), big swings (ship the layer, sign the flagship, the access call), one experiment.'],
      cue:'The experiment makes it falsifiable. If ingest doesn’t out-move the kit-only arm by day 60, pivot to brand demand (get brands to creators, not more tooling). Live name to drop: Tom Alder (Strategy Breakdowns, 125k) already runs his business on beehiiv and sells his own direct sponsorships, and he is currently championing your July 16 release. The operators are already in your orbit. Keep Matt McGarry as the flagship; Alder is supporting proof, not a partner.',
      ask:[[28,'A2 · owners, dates and budget']] },
    { tag:'Plan', title:'How I’d drive it', phase:'Plan',
      land:'In-product is the highest-reach channel. The flagship is the operator beehiiv already champions.',
      body:['In-product, the most reach: trigger “run this deal on beehiiv” at the moment of intent, a pasted sponsor email, a milestone, an opened media-kit page.','The named flagship: Matt McGarry runs Newsletter Operator on beehiiv and teaches creators to land direct sponsors. The operator who teaches it, running it in public.','Community + events (the Newsletter Conference, his community, your virtual events), and lifecycle + content (lead with the outcome, point SEO at running and proving the deal).'],
      cue:'<b>For Tony.</b> In-product is highest-reach because the segment already lives in beehiiv. The flagship is the fastest credible route at scale.' },
    { tag:'Plan', title:'How I’d educate', phase:'Plan',
      land:'Outcome based marketing, applied. Teach the job and the tool gets used.',
      body:['The storefront is underadopted because selling direct is untaught, not because the feature is missing.','Diagnose with the cohort, then teach in product at the moment of intent.','The certified report becomes the case study that teaches and sells the next deal.'],
      cue:'If asked how I would educate the market, this is the answer. Tyler named outcome based marketing as the gap, this is it applied.' },
    { tag:'Show', title:'The live demo', phase:'Proof',
      land:'I didn’t just write the strategy, I built the two artifacts. Both are live, you can click them.',
      body:['Stop presenting. Switch to the browser. Both are built and live.','The landing page (ds-landing-page-omega.vercel.app): beehiiv’s live style, the Bring Your Own Deals message.','The media kit and certified report (byod-media-kit.vercel.app): the moment a tool outside the send can’t produce.','PMM owns the page, Product ships the moment.'],
      cue:'The peak of the deck. Don’t rush. Click into the report. This proves you can ship the creator-facing content the seat needs.' },
    { tag:'Show', title:'Success metrics', phase:'Proof',
      land:'MRR is the north star. Bringing a deal in is the correlated action that drives it.',
      body:['The one number: established creators who bring at least one external deal, plus the share of their deals run on beehiiv.','The count proves they start, the share proves it sticks.','Leading (PMM): deals brought in, kits published, activation events. Lagging: cohort MRR, new advertiser accounts.','30/60/90 reads and a kill gate at day 60. One shared dashboard built in week one.'],
      cue:'<b>For Tony.</b> Use his “correlated action” logic, the same as first-automation. Don’t lecture him on growth.' },
    { tag:'Show', title:'eBay', phase:'Proof',
      land:'Same problem, different product. I fixed it by positioning around the outcome and arming a partner.',
      body:['Sellers asked for control and reporting. What they wanted underneath was more sales.','Built the analytics: ~50% more sales, a stat we pulled with the data team. Positioned on the outcome, A/B tested, CTR up 87%.','Drove adoption through a partner, not headcount: one ChannelAdvisor webinar lifted daily spend 108x. $0 to $180M in ~2 years, 2,500 brands.'],
      cue:'The 50% came from a stat we pulled with the data team, our key positioning proof, not an official eBay headline. The certified report is the creator-side version of this.' },
    { tag:'Show', title:'How I built this', phase:'Proof',
      land:'How I built this is how I’d run the seat.',
      body:['A fully sourced strategy and a working asset. The method covers more ground, then I spend the saved time on judgment.','Worked across the interviews, the community, competitors, ads, the live product and API, a senior-PMM practice database.','The discipline: every number carries a source or it doesn’t ship. Every output rewritten in my voice through a quality gate.'],
      cue:'<b>For Tyler, the AI-native CEO.</b> Same discipline as the product I’m pitching: everything sourced, the judgment mine.' },
    { tag:'Ask', title:'The ask', phase:'Close',
      land:'It’s the problem I’ve solved before, and the work I want to do here.',
      body:['Three asks: greenlight the ad-ops layer (kit and ingest first), make the access call to open it to Scale, back the cohort and sign the flagship.','That turns your highest-value product from booked-only into the operating system creators run their whole business on.','And every deal they bring becomes new demand for your Ad Network.'],
      cue:'<b>The access call is Jake’s and Shreya’s</b> (tiers and the upgrade flow are her surface). Look at them on that line.' },
    { tag:'Close', title:'Thank you', phase:'Close',
      land:'Happy to go deeper on any track, the build footprint, or the day-60 kill gate.',
      body:['Stop. Invite the discussion.','Have the appendix ready: competitive table, owners and budget, sources. Use the Jump control to pull any of them live.'] },
    { tag:'Reserve', title:'Appendix index', phase:'Reserve',
      body:['Held in reserve. Tap an item, or use the Jump control on the deck, to pull it up live, then jump back.'] },
    { tag:'Reserve', title:'A1 · Competitive table', phase:'Reserve',
      body:['The full four-column competitive detail.','Passionfroot is strongest and even reads the API, but the line that holds is that it sits outside the send.'] },
    { tag:'Reserve', title:'A2 · Owners, dates and budget', phase:'Reserve',
      body:['Owners: PMM (message, cohort, launch), Product (access call, ingest, sponsor account), Growth (lifecycle, instrumentation).','Day-60 kill gate: PMM runs, Product calls. ~$120k total, most of it funds people and slow channels, not paid impressions.'] },
    { tag:'Reserve', title:'A3 · Sources', phase:'Reserve',
      body:['Every number has a source or it’s flagged to validate.','Creators, the API check, Passionfroot terms, eBay, and the held-until-validated calls.'] },
    { tag:'Reserve', title:'A4 · Where I have done this before', phase:'Reserve',
      land:'Proof on demand. Every claim has a real example, one click away.',
      body:['Only open this if they ask for examples of past work.','Each row links to the live work or the case.'],
      cue:'The UpGuard lesson, have the receipts ready. Do not present this, pull it up on demand.' },
  ];

  const total = NOTES.length;
  let index = 0;
  const $ = (id) => document.getElementById(id);
  const select = $('slideSelect');
  const iframe = $('preview');

  NOTES.forEach((n,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=(i+1)+'. '+n.title; select.appendChild(o); });
  select.addEventListener('change', e=>setIndex(parseInt(e.target.value,10)));

  // build segment dots
  const seg = $('seg');
  NOTES.forEach((n,i)=>{ if(BUDGETS[i]>0){ const d=document.createElement('i'); d.dataset.i=i; seg.appendChild(d); } });

  function fmt(s){ const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }
  function cum(idx){ let t=0; for(let i=0;i<=idx;i++) t+=BUDGETS[i]||0; return t; }

  function render(){
    const n = NOTES[index];
    $('num').textContent = 'Slide '+(index+1);
    const tag=$('tag'); tag.textContent=n.tag; tag.className='tag'+(PEAK.has(index)?' peak':'')+(n.tag==='Reserve'?' reserve':'');
    $('title').textContent = n.title;
    const lw=$('landWrap');
    if(n.land){ lw.style.display='block'; $('land').textContent=n.land; } else { lw.style.display='none'; }
    $('body').innerHTML = n.body.map(b=>'<li>'+b+'</li>').join('');
    const cue=$('cue'); if(n.cue){ cue.style.display='block'; cue.innerHTML=n.cue; } else { cue.style.display='none'; }
    const ask=$('ask');
    if(n.ask && n.ask.length){ ask.innerHTML='<h3>If asked, pull up</h3>'+n.ask.map(a=>'<button data-i="'+a[0]+'">&rarr; '+a[1]+'</button>').join(''); ask.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>setIndex(parseInt(b.dataset.i,10)))); }
    else { ask.innerHTML=''; }
    $('slideNum').textContent=index+1; $('slideTotal').textContent=total;
    $('phase').textContent=n.phase;
    $('slideBudget').textContent = BUDGETS[index]>0?fmt(BUDGETS[index]):'held';
    $('cumTarget').textContent = fmt(cum(index));
    $('target').textContent = 'Target '+fmt(cum(index));
    select.value=index;
    $('notesCol').scrollTop=0;
    [...seg.children].forEach(d=>{ const di=+d.dataset.i; d.className=di<index?'done':(di===index?'cur':''); });
    scrollPreview(index);
  }

  function scrollPreview(i){
    // postMessage path works on plain file:// with no flags
    try { iframe.contentWindow.postMessage({type:'gotoSlide', i:i}, '*'); } catch(e){}
    // direct-DOM fallback (only succeeds when same-origin access is allowed)
    try {
      const slides = iframe.contentWindow.document.querySelectorAll('.slide');
      if(slides[i]) slides[i].scrollIntoView({behavior:'auto'});
    } catch(e){ /* blocked on file://, postMessage already handled it */ }
  }

  function setIndex(i){ index=Math.max(0,Math.min(total-1,i)); render(); }
  function prev(){ setIndex(index-1); }
  function next(){ setIndex(index+1); }

  document.addEventListener('keydown',(e)=>{
    if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); next(); }
    else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); prev(); }
    else if(e.key==='Home'){ setIndex(0); } else if(e.key==='End'){ setIndex(total-1); }
  });

  // timer
  let elapsed=0, timerId=null;
  function tick(){ elapsed++; const c=$('clock'); c.textContent=fmt(elapsed); c.classList.toggle('over', elapsed>cum(Math.min(index,24))); }
  function toggleTimer(){ const b=$('timerBtn'); if(timerId){ clearInterval(timerId); timerId=null; b.textContent='Start'; } else { timerId=setInterval(tick,1000); b.textContent='Pause'; } }
  function resetTimer(){ if(timerId){ clearInterval(timerId); timerId=null; $('timerBtn').textContent='Start'; } elapsed=0; $('clock').textContent='0:00'; $('clock').classList.remove('over'); }

  iframe.addEventListener('load', ()=>scrollPreview(index));
  render();
</script>
</body>
</html>
